<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For My Love 💖</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .card {
      width: 90%;
      max-width: 430px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 30px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(255, 0, 120, 0.35);
      animation: muncul 1s ease;
      z-index: 2;
    }

    .photo {
      width: 220px;
      height: 220px;
      margin: auto;
      border-radius: 50%;
      padding: 7px;
      background: linear-gradient(45deg, #ff4d8d, #ffb6c1, #ff1493);
      animation: glow 2s infinite alternate;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    h1 {
      color: #ff1493;
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      color: #444;
      font-size: 18px;
      line-height: 1.6;
    }

    button {
      background: #ff1493;
      color: white;
      border: none;
      padding: 13px 25px;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(255, 20, 147, 0.4);
    }

    button:hover {
      transform: scale(1.08);
    }

    .hidden {
      display: none;
      margin-top: 20px;
      color: #ff1493;
      font-weight: bold;
      font-size: 20px;
    }

    .heart {
      position: absolute;
      color: white;
      font-size: 25px;
      animation: jatuh 5s linear infinite;
      opacity: 0.8;
    }

    @keyframes muncul {
      from {
        transform: scale(0.7);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes glow {
      from {
        box-shadow: 0 0 10px #ff69b4;
      }
      to {
        box-shadow: 0 0 30px #ff1493;
      }
    }

    @keyframes jatuh {
      from {
        transform: translateY(-100vh) rotate(0deg);
      }
      to {
        transform: translateY(100vh) rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <div class="heart" style="left: 10%; animation-delay: 0s;">💖</div>
  <div class="heart" style="left: 25%; animation-delay: 1s;">💕</div>
  <div class="heart" style="left: 40%; animation-delay: 2s;">💘</div>
  <div class="heart" style="left: 60%; animation-delay: 0.5s;">💗</div>
  <div class="heart" style="left: 80%; animation-delay: 1.5s;">💞</div>

  <div class="card">
    <div class="photo">
      <img src="mbg.jpeg" alt="Foto Pacarku">
    </div>

    <h1>Hai Sayang 💖</h1>

    <p>
      Aku cuma mau bilang,<br>
      kamu itu orang paling spesial di hidup aku.
      Terima kasih sudah hadir dan bikin hari-hariku lebih indah.
    </p>

    <button onclick="showLove()">Klik Aku 💌</button>

    <div id="loveText" class="hidden">
      I love you more than anything 💕
    </div>
  </div>

  <script>
    function showLove() {
      document.getElementById("loveText").style.display = "block";
    }
  </script>

</body>
</html>
