<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open This 💌</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: "Comic Sans MS", "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #ffd6e8, #fff3b0, #cdb4db);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.card {
  width: 92%;
  max-width: 480px;
  background: white;
  border-radius: 32px;
  padding: 24px;
  text-align: center;
  border: 4px dashed #ff85b3;
  box-shadow: 0 18px 0 #ffb3c6, 0 25px 45px rgba(255,105,180,0.35);
  z-index: 2;
  animation: pop 0.9s ease;
}

.sticker {
  font-size: 48px;
  animation: wiggle 1.5s infinite;
}

h1 {
  color: #ff4f9a;
  margin: 10px 0;
  font-size: 30px;
}

.photo-row {
  display: flex;
  gap: 14px;
  justify-content: center;
  margin: 18px 0;
}

.photo-wrap {
  width: 145px;
  height: 145px;
  border-radius: 28px;
  padding: 7px;
  background: repeating-linear-gradient(
    45deg,
    #ff85b3,
    #ff85b3 10px,
    #ffd6e8 10px,
    #ffd6e8 20px
  );
  box-shadow: 0 10px 20px rgba(255, 105, 180, 0.35);
}

.photo-wrap:first-child { transform: rotate(-5deg); }
.photo-wrap:last-child { transform: rotate(5deg); }

.photo-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border: 5px solid white;
  border-radius: 22px;
}

.text-box {
  background: #fff0f6;
  border-radius: 22px;
  padding: 16px;
  color: #5c3d46;
  font-size: 17px;
  line-height: 1.6;
  min-height: 100px;
}

button {
  margin: 14px 5px 0;
  border: none;
  border-radius: 999px;
  padding: 13px 20px;
  font-size: 15px;
  cursor: pointer;
  font-weight: bold;
}

.yes {
  background: #ff4f9a;
  color: white;
  box-shadow: 0 7px 0 #d63384;
}

.no {
  background: #ffe066;
  color: #6b4e00;
  box-shadow: 0 7px 0 #f2b705;
}

.result {
  display: none;
  margin-top: 18px;
  font-size: 20px;
  color: #ff1493;
  font-weight: bold;
}

.slider {
  display: none;
  margin-top: 20px;
  animation: pop 0.7s ease;
}

.slide-photo {
  width: 230px;
  height: 230px;
  margin: 10px auto;
  border-radius: 35px;
  overflow: hidden;
  border: 7px solid #ff85b3;
  box-shadow: 0 12px 25px rgba(255,105,180,0.35);
  background: #fff0f6;
}

.slide-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.bubble {
  position: absolute;
  bottom: -50px;
  font-size: 25px;
  animation: floatUp linear infinite;
  opacity: 0.85;
}

@keyframes pop {
  0% { transform: scale(0.5) rotate(-8deg); opacity: 0; }
  70% { transform: scale(1.08) rotate(3deg); opacity: 1; }
  100% { transform: scale(1) rotate(0); }
}

@keyframes wiggle {
  0%, 100% { transform: rotate(-8deg); }
  50% { transform: rotate(8deg); }
}

@keyframes floatUp {
  from { transform: translateY(0) rotate(0deg); }
  to { transform: translateY(-120vh) rotate(360deg); }
}
</style>
</head>

<body>

<div class="card">
  <div class="sticker">🐻💌</div>

  <h1>Surat Rahasia!</h1>

  <div class="photo-row">
    <div class="photo-wrap">
      <img src="mbg.jpeg">
    </div>

    <div class="photo-wrap">
      <img src="mbg2.jpeg">
    </div>
  </div>

  <div class="text-box" id="message">
    Halo kamu yang lucu 😳<br>
    Aku punya sesuatu nih...
  </div>

  <button class="yes" onclick="nextText()">Buka Surat 💖</button>
  <button class="no" onmouseover="runAway()" onclick="runAway()" id="noBtn">
    Jangan dibuka 😝
  </button>

  <div class="result" id="result">
    Ternyata isinya: aku sayang kamu banyak-banyak 😘💗
  </div>

  <div class="slider" id="slider">
    <div class="slide-photo">
      <img id="slideImage" src="mbg3.jpeg">
    </div>

    <button class="yes" onclick="prevSlide()">⬅</button>
    <button class="yes" onclick="nextSlide()">➡</button>
  </div>
</div>

<script>
const texts = [
  "Halo kamu yang lucu 😳<br>Aku punya sesuatu nih...",
  "Jangan kaget ya... ini bukan tugas sekolah 😆",
  "Aku cuma mau bilang, kamu itu gemesin banget 💕",
  "Dua foto ini aja masih belum cukup buat nunjukin kamu 😌",
  "Kalau kamu senyum sekarang, berarti aku menang 😝",
  "Kesimpulannya: kamu favorit aku 💖"
];

const slides = [
  "mbg3.jpeg",
  "mbg4.jpeg",
  "mbg5.jpeg"
];

let index = 0;
let slideIndex = 0;
let finished = false;

function nextText() {
  if (finished) {
    document.getElementById("slider").style.display = "block";
    return;
  }

  index++;

  if (index < texts.length) {
    document.getElementById("message").innerHTML = texts[index];
  } else {
    finished = true;
    document.getElementById("result").style.display = "block";
    document.getElementById("slider").style.display = "block";
  }
}

function nextSlide() {
  slideIndex++;
  if (slideIndex >= slides.length) slideIndex = 0;
  updateSlide();
}

function prevSlide() {
  slideIndex--;
  if (slideIndex < 0) slideIndex = slides.length - 1;
  updateSlide();
}

function updateSlide() {
  document.getElementById("slideImage").src = slides[slideIndex];
}

function runAway() {
  const btn = document.getElementById("noBtn");
  const x = Math.random() * 120 - 60;
  const y = Math.random() * 80 - 40;
  btn.style.transform = `translate(${x}px, ${y}px)`;
}

function createBubble() {
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = ["💖","💕","🌸","✨","🐻","💌","😳"][Math.floor(Math.random()*7)];
  bubble.style.left = Math.random() * 100 + "vw";
  bubble.style.animationDuration = (4 + Math.random() * 4) + "s";

  document.body.appendChild(bubble);

  setTimeout(() => bubble.remove(), 8000);
}

setInterval(createBubble, 420);
</script>

</body>
</html>
