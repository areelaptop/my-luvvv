<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open This 💖</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 25px;
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,0.3);
  max-width: 400px;
  z-index: 2;
}

.photo {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  overflow: hidden;
  margin: auto;
  border: 6px solid hotpink;
}

.photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

h1 {
  color: deeppink;
}

#typing {
  font-size: 18px;
  color: #333;
  min-height: 60px;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 25px;
  background: deeppink;
  color: white;
  cursor: pointer;
}

button:hover {
  transform: scale(1.1);
}

.heart {
  position: absolute;
  font-size: 20px;
  animation: fall 5s linear infinite;
}

@keyframes fall {
  0% { transform: translateY(-100vh); }
  100% { transform: translateY(100vh); }
}
</style>
</head>

<body>

<div class="heart" style="left:10%;">💖</div>
<div class="heart" style="left:30%; animation-delay:1s;">💕</div>
<div class="heart" style="left:50%; animation-delay:2s;">💘</div>
<div class="heart" style="left:70%; animation-delay:3s;">💗</div>
<div class="heart" style="left:90%; animation-delay:4s;">💞</div>

<div class="card">
  <div class="photo">
    <img src="mbg.jpeg">
  </div>

  <h1>Hai Kamu 💖</h1>

  <p id="typing"></p>

  <button onclick="showLove()">Klik Ini 💌</button>

  <p id="love" style="display:none; color:deeppink; font-weight:bold;">
    I LOVE YOU ❤️
  </p>
</div>

<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<script>
const text = "Aku nggak jago ngomong romantis... tapi aku selalu jujur kalau soal kamu 💖";
let i = 0;

function typingEffect() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typingEffect, 50);
  }
}

typingEffect();

function showLove() {
  document.getElementById("love").style.display = "block";
}
</script>

</body>
</html>
